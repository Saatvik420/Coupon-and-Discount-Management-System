# Server Configuration - Dynamic port for Render
server.port=${PORT:8080}

# MongoDB Configuration - Use environment variable with SSL for Atlas
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/coupon_management?ssl=true&retryWrites=true&w=majority}
spring.data.mongodb.database=coupon_management
spring.data.mongodb.auto-index-creation=true

# JWT Configuration - Use environment variable
jwt.secret=${JWT_SECRET:CouponApp2024SecureJwtSecretKeyForProductionUseThisStrongRandomString256BitsLong!}
jwt.expiration=86400000

# CORS Configuration - Use environment variable
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://coupon-discount-manage-sys.netlify.app,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.docExpansion=none
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.defaultModelsExpandDepth=1
springdoc.swagger-ui.defaultModelExpandDepth=1
