# Server Configuration - Dynamic port for Render
server.port=${PORT:8080}

# MongoDB Configuration - Use environment variable
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/coupon_management}
spring.data.mongodb.database=coupon_management

# JWT Configuration - Use environment variable
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}
jwt.expiration=86400000

# CORS Configuration - Use environment variable
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
