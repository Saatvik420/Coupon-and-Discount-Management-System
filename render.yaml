services:
  # Backend Spring Boot Service
  - type: web
    name: coupon-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: ./backend
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://coupon-frontend.netlify.app
      - key: PORT
        value: 8080
    healthCheckPath: /api/actuator/health
    autoDeploy: yes
    repo: https://github.com/YOUR_USERNAME/coupon-management.git
